{% extends 'dashboard/base.html' %}
{% block content %}
<div class="panel" style="max-width: 500px; margin: auto;">
    <h3><i class="fas fa-play-circle"></i> Initialize Class</h3>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Subject Name</label>
            <input type="text" name="subject" class="form-control" required style="width:100%; padding:10px; background:var(--surface-light); border:1px solid var(--border); color:white; border-radius:8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Class Duration (Minutes)</label>
            <input type="number" name="duration" value="60" class="form-control" style="width:100%; padding:10px; background:var(--surface-light); border:1px solid var(--border); color:white; border-radius:8px;">
        </div>
        <button type="submit" class="btn-action" style="width: 100%; background: var(--primary); color: white;">Start Monitoring</button>
    </form>
</div>
{% endblock %}
