{% extends 'dashboard/base.html' %}
{% block title %}Notifications Center{% endblock %}

{% block extra_head %}
<style>
    :root {
        --accent-primary: #1a5694;
        --accent-secondary: #2d7bb6;
        --accent-success: #27ae60;
        --accent-warning: #f39c12;
        --accent-danger: #e74c3c;
        --accent-info: #3498db;
        --bg-light: #f8fafc;
        --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    /* ===== NOTIFICATIONS CONTAINER ===== */
    .notifications-container {
        margin-left: 0;
        padding: 0.5rem;
        width: 100%;
        transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== ACADEMIC HEADER ===== */
    .academic-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        border-radius: 20px;
        padding: 2rem 2.5rem;
        margin-bottom: 1rem;
        position: relative;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(26, 86, 148, 0.25);
    }

    .academic-header::before {
        content: '';
        position: absolute;
        top: -40%;
        right: -10%;
        width: 50%;
        height: 180%;
        background: radial-gradient(ellipse, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
        pointer-events: none;
    }

    .academic-header::after {
        content: '📚';
        position: absolute;
        right: 3rem;
        bottom: 0.5rem;
        font-size: 8rem;
        opacity: 0.06;
        transform: rotate(-8deg);
    }

    .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1.5rem;
        position: relative;
        z-index: 2;
    }

    .header-title-section {
        display: flex;
        align-items: center;
        gap: 1.25rem;
    }

    .header-icon-wrapper {
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
    }

    .header-icon-wrapper i {
        font-size: 1.5rem;
        color: #60a5fa;
    }

    .header-title h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: white;
        margin: 0 0 0.15rem 0;
        letter-spacing: -0.5px;
    }

    .header-title p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.85rem;
        margin: 0;
        font-weight: 400;
    }

    .header-title p i {
        margin-right: 0.35rem;
        font-size: 0.7rem;
        opacity: 0.7;
    }

    .header-stats {
        display: flex;
        gap: 1rem;
    }

    .stat-pill {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 0.6rem 1.25rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.3s ease;
        min-width: 80px;
    }

    .stat-pill:hover {
        background: rgba(255, 255, 255, 0.14);
        transform: translateY(-2px);
    }

    .stat-pill .number {
        font-size: 1.5rem;
        font-weight: 800;
        color: white;
        line-height: 1.2;
        display: block;
    }

    .stat-pill .label {
        font-size: 0.6rem;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 600;
    }

    /* ===== FILTER BAR ===== */
    .filter-bar {
        background: var(--surface);
        border-radius: 16px;
        padding: 0.75rem 1.5rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        box-shadow: var(--card-shadow);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .filter-group {
        display: flex;
        gap: 0.25rem;
        background: var(--bg-light);
        padding: 0.2rem;
        border-radius: 12px;
        flex-wrap: nowrap;
    }

    .filter-btn {
        padding: 0.45rem 1rem;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text-dim);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: inherit;
    }

    .filter-btn i {
        font-size: 0.7rem;
    }

    .filter-btn:hover {
        color: var(--accent-primary);
        background: rgba(26, 86, 148, 0.05);
    }

    .filter-btn.active {
        background: var(--accent-primary);
        color: white;
        box-shadow: 0 2px 12px rgba(26, 86, 148, 0.25);
    }

    .filter-btn.active:hover {
        background: #0d3b6e;
    }

    .filter-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
    }

    .action-btn-outline {
        padding: 0.45rem 1.1rem;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--text-main);
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: inherit;
    }

    .action-btn-outline:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
        background: rgba(26, 86, 148, 0.04);
        transform: translateY(-1px);
    }

    .action-btn-primary {
        padding: 0.45rem 1.25rem;
        border-radius: 10px;
        border: none;
        background: var(--accent-primary);
        color: white;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: inherit;
        box-shadow: 0 2px 12px rgba(26, 86, 148, 0.2);
    }

    .action-btn-primary:hover {
        background: #0d3b6e;
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(26, 86, 148, 0.3);
    }

    /* ===== SEARCH BAR ===== */
    .search-wrapper {
        position: relative;
        min-width: 200px;
        flex: 1;
        max-width: 280px;
    }

    .search-wrapper .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-dim);
        font-size: 0.8rem;
        opacity: 0.6;
        transition: opacity 0.3s;
    }

    .search-wrapper input {
        width: 100%;
        padding: 0.45rem 1rem 0.45rem 2.2rem;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--bg-light);
        color: var(--text-main);
        font-size: 0.82rem;
        transition: all 0.3s ease;
        font-family: inherit;
        outline: none;
    }

    .search-wrapper input:focus {
        border-color: var(--accent-primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(26, 86, 148, 0.06);
    }

    .search-wrapper input:focus~.search-icon,
    .search-wrapper input:focus+.search-icon {
        opacity: 1;
        color: var(--accent-primary);
    }

    /* ===== NOTIFICATION LIST ===== */
    .notification-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    /* ===== NOTIFICATION ITEM ===== */
    .notification-item {
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 0.5rem 1.5rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        display: flex;
        gap: 1.25rem;
        align-items: flex-start;
        box-shadow: var(--card-shadow);
    }

    .notification-item:hover {
        border-color: var(--accent-primary);
        box-shadow: var(--card-shadow-hover);
        transform: translateX(4px);
    }

    .notification-item.unread {
        background: linear-gradient(to right, rgba(26, 86, 148, 0.02), var(--surface));
        border-left: 4px solid var(--accent-primary);
    }

    .notification-item.priority-high {
        border-left: 4px solid var(--accent-danger);
    }

    .notification-item.priority-high.unread {
        background: linear-gradient(to right, rgba(231, 76, 60, 0.04), var(--surface));
    }

    .notification-item.priority-medium {
        border-left: 4px solid var(--accent-warning);
    }

    /* Notification Icon */
    .notification-icon-wrapper {
        flex-shrink: 0;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        transition: transform 0.3s ease;
    }

    .notification-item:hover .notification-icon-wrapper {
        transform: scale(1.05);
    }

    /* Notification Content */
    .notification-content {
        flex: 1;
        min-width: 0;
    }

    .notification-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.35rem;
    }

    .notification-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 0;
        line-height: 1.3;
    }

    .notification-badge {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 0.15rem 0.6rem;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        flex-shrink: 0;
    }

    .badge-unread {
        background: var(--accent-primary);
        color: white;
        animation: pulse-badge 2s infinite;
    }

    @keyframes pulse-badge {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.6;
        }
    }

    .badge-attendance {
        background: rgba(39, 174, 96, 0.12);
        color: #27ae60;
    }

    .badge-session {
        background: rgba(26, 86, 148, 0.12);
        color: #1a5694;
    }

    .badge-proxy {
        background: rgba(231, 76, 60, 0.12);
        color: #e74c3c;
    }

    .badge-student {
        background: rgba(243, 156, 18, 0.12);
        color: #f39c12;
    }

    .badge-system {
        background: rgba(155, 89, 182, 0.12);
        color: #9b59b6;
    }

    .badge-achievement {
        background: rgba(241, 196, 15, 0.12);
        color: #f1c40f;
    }

    .notification-message {
        font-size: 0.85rem;
        color: var(--text-dim);
        line-height: 1.6;
        margin: 0.2rem 0 0.4rem 0;
    }

    .notification-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 1.25rem;
        font-size: 0.7rem;
        color: var(--text-dim);
        margin-top: 0.4rem;
    }

    .notification-meta span {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
    }

    .notification-meta i {
        font-size: 0.6rem;
        opacity: 0.6;
    }

    .notification-metadata {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.5rem;
    }

    .metadata-tag {
        background: var(--bg-light);
        padding: 0.15rem 0.6rem;
        border-radius: 6px;
        font-size: 0.65rem;
        color: var(--text-dim);
        border: 1px solid var(--border);
        font-weight: 500;
    }

    .metadata-tag strong {
        color: var(--text-main);
        font-weight: 600;
    }

    .notification-actions {
        display: flex;
        gap: 0.3rem;
        opacity: 0;
        transform: translateX(8px);
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .notification-item:hover .notification-actions {
        opacity: 1;
        transform: translateX(0);
    }

    .action-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
    }

    .action-icon:hover {
        background: var(--bg-light);
        color: var(--accent-primary);
    }

    .action-icon.danger:hover {
        background: rgba(231, 76, 60, 0.08);
        color: var(--accent-danger);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--card-shadow);
    }

    .empty-state .empty-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.25rem;
        background: linear-gradient(135deg, #e8f0fe, #d4e4f7);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--accent-primary);
        opacity: 0.6;
    }

    .empty-state h3 {
        font-size: 1.2rem;
        color: var(--text-main);
        margin-bottom: 0.3rem;
    }

    .empty-state p {
        color: var(--text-dim);
        font-size: 0.9rem;
    }

    /* ===== SKELETON LOADING ===== */
    .skeleton-item {
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 1.25rem 1.5rem;
        display: flex;
        gap: 1.25rem;
        align-items: flex-start;
        box-shadow: var(--card-shadow);
    }

    .skeleton-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(90deg, var(--border) 25%, var(--bg-light) 50%, var(--border) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        flex-shrink: 0;
    }

    .skeleton-content {
        flex: 1;
    }

    .skeleton-title {
        width: 50%;
        height: 18px;
        border-radius: 6px;
        background: linear-gradient(90deg, var(--border) 25%, var(--bg-light) 50%, var(--border) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        margin-bottom: 0.5rem;
    }

    .skeleton-text {
        width: 70%;
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--border) 25%, var(--bg-light) 50%, var(--border) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
    }

    .skeleton-text.short {
        width: 40%;
    }

    @keyframes shimmer {
        0% {
            background-position: 200% 0;
        }

        100% {
            background-position: -200% 0;
        }
    }

    /* ===== PAGINATION ===== */
    .pagination-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.4rem;
        margin-top: 2rem;
        flex-wrap: wrap;
    }

    .page-btn {
        min-width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-main);
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 500;
        font-size: 0.85rem;
        font-family: inherit;
    }

    .page-btn:hover:not(:disabled):not(.active) {
        background: var(--bg-light);
        border-color: var(--accent-primary);
        transform: translateY(-2px);
    }

    .page-btn.active {
        background: var(--accent-primary);
        color: white;
        border-color: var(--accent-primary);
        box-shadow: 0 2px 12px rgba(26, 86, 148, 0.25);
    }

    .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    /* ===== TOAST NOTIFICATIONS ===== */
    .toast-container {
        position: fixed;
        top: 80px;
        right: 24px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 380px;
        width: 100%;
        pointer-events: none;
    }

    .toast {
        pointer-events: auto;
        padding: 0.9rem 1.25rem;
        border-radius: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        animation: slideInRight 0.4s ease-out;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-main);
    }

    .toast i {
        font-size: 1.1rem;
        flex-shrink: 0;
    }

    .toast.success {
        border-left: 4px solid var(--accent-success);
    }

    .toast.success i {
        color: var(--accent-success);
    }

    .toast.error {
        border-left: 4px solid var(--accent-danger);
    }

    .toast.error i {
        color: var(--accent-danger);
    }

    .toast.warning {
        border-left: 4px solid var(--accent-warning);
    }

    .toast.warning i {
        color: var(--accent-warning);
    }

    .toast.info {
        border-left: 4px solid var(--accent-info);
    }

    .toast.info i {
        color: var(--accent-info);
    }

    @keyframes slideInRight {
        from {
            transform: translateX(120%);
            opacity: 0;
        }

        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @keyframes slideOutRight {
        from {
            transform: translateX(0);
            opacity: 1;
        }

        to {
            transform: translateX(120%);
            opacity: 0;
        }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
        .filter-bar {
            flex-direction: column;
            align-items: stretch;
            gap: 0.75rem;
            padding: 1rem;
        }

        .search-wrapper {
            max-width: none;
        }

        .filter-group {
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-actions {
            justify-content: center;
        }
    }

    @media (max-width: 768px) {
        .academic-header {
            padding: 1.5rem;
        }

        .academic-header::after {
            display: none;
        }

        .header-content {
            flex-direction: column;
            text-align: center;
        }

        .header-title-section {
            flex-direction: column;
            text-align: center;
        }

        .header-stats {
            width: 100%;
            justify-content: center;
        }

        .stat-pill {
            flex: 1;
            min-width: 60px;
            padding: 0.4rem 0.8rem;
        }

        .stat-pill .number {
            font-size: 1.2rem;
        }

        .notification-item {
            padding: 1rem 1.25rem;
            flex-wrap: wrap;
        }

        .notification-actions {
            opacity: 1;
            transform: none;
            width: 100%;
            justify-content: flex-end;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .notification-header {
            flex-direction: column;
            align-items: flex-start;
        }

        .filter-btn {
            font-size: 0.7rem;
            padding: 0.35rem 0.7rem;
        }

        .action-btn-outline,
        .action-btn-primary {
            font-size: 0.7rem;
            padding: 0.35rem 0.8rem;
        }
    }

    @media (max-width: 480px) {
        .stat-pill .number {
            font-size: 1rem;
        }

        .stat-pill .label {
            font-size: 0.5rem;
        }

        .notification-title {
            font-size: 0.85rem;
        }

        .notification-message {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="notifications-container">
    <!-- ===== ACADEMIC HEADER ===== -->
    <div class="academic-header">
        <div class="header-content">
            <div class="header-title-section">
                <div class="header-icon-wrapper">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="header-title">
                    <h1>Notifications Center</h1>
                    <p><i class="fas fa-clock"></i> Stay informed about your academic journey</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-pill">
                    <span class="number" id="totalCount">0</span>
                    <span class="label">Total</span>
                </div>
                <div class="stat-pill">
                    <span class="number" id="unreadCount">0</span>
                    <span class="label">Unread</span>
                </div>
                <div class="stat-pill">
                    <span class="number" id="readCount">0</span>
                    <span class="label">Read</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== FILTER BAR ===== -->
    <div class="filter-bar">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-list-ul"></i> All
            </button>
            <button class="filter-btn" data-filter="unread">
                <i class="fas fa-envelope"></i> Unread
            </button>
            <button class="filter-btn" data-filter="read">
                <i class="fas fa-check-circle"></i> Read
            </button>
        </div>

        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="notificationSearch" placeholder="Search notifications..."
                oninput="searchNotifications(this.value)">
        </div>

        <div class="filter-actions">
            <button class="action-btn-outline" onclick="exportNotifications()">
                <i class="fas fa-file-export"></i> Export
            </button>
            <button class="action-btn-outline" onclick="refreshNotifications()">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="action-btn-primary" onclick="markAllRead()">
                <i class="fas fa-check-double"></i> Mark All Read
            </button>
        </div>
    </div>

    <!-- ===== NOTIFICATION LIST ===== -->
    <div class="notification-list" id="notificationsContainer"></div>

    <!-- ===== PAGINATION ===== -->
    <div class="pagination-wrapper" id="paginationContainer"></div>
</div>

<script>
    // ============================================================
    // ACADEMIC NOTIFICATIONS - FULL FUNCTIONALITY
    // ============================================================

    // ===== STATE =====
    let currentPage = 1;
    let currentFilter = 'all';
    let totalPages = 1;
    let isLoading = false;
    let refreshTimer = null;
    let searchTimeout = null;

    // ===== NOTIFICATION TYPES CONFIG =====
    const NOTIFICATION_TYPES = {
        'attendance': { icon: 'fa-user-check', color: '#27ae60', label: 'Attendance' },
        'session': { icon: 'fa-chalkboard-teacher', color: '#1a5694', label: 'Session' },
        'proxy': { icon: 'fa-shield-alt', color: '#e74c3c', label: 'Security' },
        'student': { icon: 'fa-user-graduate', color: '#f39c12', label: 'Student' },
        'system': { icon: 'fa-server', color: '#9b59b6', label: 'System' },
        'achievement': { icon: 'fa-trophy', color: '#f1c40f', label: 'Achievement' },
        'reminder': { icon: 'fa-bell', color: '#3498db', label: 'Reminder' },
        'grade': { icon: 'fa-chart-line', color: '#1abc9c', label: 'Grade' },
        'assignment': { icon: 'fa-tasks', color: '#e67e22', label: 'Assignment' },
        'exam': { icon: 'fa-pencil-alt', color: '#e74c3c', label: 'Exam' }
    };

    // ===== LOAD NOTIFICATIONS =====
    function loadNotifications(page = 1, filter = currentFilter, append = false) {
        if (isLoading) return;
        isLoading = true;

        currentPage = page;
        currentFilter = filter;

        const container = document.getElementById('notificationsContainer');

        if (!append) {
            container.innerHTML = getSkeletonHTML();
        }

        let url = `/dashboard/api/notifications/all/?page=${page}&per_page=15`;
        if (filter === 'unread') url += '&unread_only=true';
        if (filter === 'read') url += '&read_only=true';

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    totalPages = data.total_pages;

                    // Update stats
                    document.getElementById('totalCount').textContent = data.total;
                    document.getElementById('unreadCount').textContent = data.unread_count;
                    document.getElementById('readCount').textContent = data.total - data.unread_count;

                    // Update parent badge
                    updateParentBadge(data.unread_count);

                    if (append) {
                        container.innerHTML += renderNotifications(data.notifications);
                    } else {
                        container.innerHTML = renderNotifications(data.notifications);
                    }

                    renderPagination(data);
                }
                isLoading = false;
            })
            .catch(() => {
                container.innerHTML = getErrorHTML();
                isLoading = false;
            });
    }

    // ===== RENDER NOTIFICATIONS =====
    function renderNotifications(notifications) {
        if (!notifications || notifications.length === 0) {
            return getEmptyHTML();
        }

        let html = '';
        notifications.forEach((notif, index) => {
            const type = NOTIFICATION_TYPES[notif.type] || NOTIFICATION_TYPES['system'];
            const isUnread = !notif.is_read;
            const priorityClass = notif.priority ? `priority-${notif.priority}` : '';
            const badgeClass = isUnread ? 'badge-unread' : `badge-${notif.type}`;

            html += `
                <div class="notification-item ${isUnread ? 'unread' : ''} ${priorityClass}"
                     onclick="handleNotificationClick(${notif.id}, '${notif.link || ''}')"
                     style="animation: fadeInUp 0.35s ease-out ${index * 0.04}s both">
                    
                    <div class="notification-icon-wrapper" style="background: ${type.color}15; color: ${type.color};">
                        <i class="fas ${type.icon}"></i>
                    </div>
                    
                    <div class="notification-content">
                        <div class="notification-header">
                            <h4 class="notification-title">${escapeHtml(notif.title)}</h4>
                            <span class="notification-badge ${badgeClass}">
                                ${isUnread ? '<i class="fas fa-circle" style="font-size: 0.4rem;"></i> New' : type.label}
                            </span>
                        </div>
                        
                        <p class="notification-message">${escapeHtml(notif.message)}</p>
                        
                        ${notif.metadata ? renderMetadata(notif.metadata) : ''}
                        
                        <div class="notification-meta">
                            <span><i class="far fa-clock"></i> ${notif.time_ago}</span>
                            <span><i class="far fa-calendar-alt"></i> ${formatDate(notif.created_at)}</span>
                            ${notif.source ? `<span><i class="far fa-user"></i> ${escapeHtml(notif.source)}</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="notification-actions">
                        ${isUnread ? `
                            <button class="action-icon" onclick="event.stopPropagation(); markAsRead(${notif.id})" title="Mark as read">
                                <i class="fas fa-check"></i>
                            </button>
                        ` : ''}
                        <button class="action-icon danger" onclick="event.stopPropagation(); deleteNotification(${notif.id})" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `;
        });

        return html;
    }

    // ===== RENDER METADATA =====
    function renderMetadata(metadata) {
        if (!metadata) return '';
        try {
            const data = typeof metadata === 'string' ? JSON.parse(metadata) : metadata;
            let html = '<div class="notification-metadata">';
            for (const [key, value] of Object.entries(data)) {
                if (value) {
                    html += `<span class="metadata-tag"><strong>${escapeHtml(key)}:</strong> ${escapeHtml(value)}</span>`;
                }
            }
            html += '</div>';
            return html;
        } catch {
            return '';
        }
    }

    // ===== SKELETON LOADER =====
    function getSkeletonHTML() {
        return Array(3).fill(0).map(() => `
            <div class="skeleton-item">
                <div class="skeleton-icon"></div>
                <div class="skeleton-content">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short" style="margin-top: 0.5rem;"></div>
                </div>
            </div>
        `).join('');
    }

    // ===== EMPTY STATE =====
    function getEmptyHTML() {
        return `
            <div class="empty-state">
                <div class="empty-icon">
                    <i class="fas fa-bell-slash"></i>
                </div>
                <h3>All caught up!</h3>
                <p>You have no notifications at the moment. Check back later for updates.</p>
            </div>
        `;
    }

    // ===== ERROR STATE =====
    function getErrorHTML() {
        return `
            <div class="empty-state">
                <div class="empty-icon" style="background: linear-gradient(135deg, #fef3f2, #fee2e2); color: #dc2626;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3>Unable to load notifications</h3>
                <p>Please check your connection and try again.</p>
                <button class="action-btn-primary" onclick="refreshNotifications()" style="margin-top: 1rem;">
                    <i class="fas fa-sync-alt"></i> Retry
                </button>
            </div>
        `;
    }

    // ===== PAGINATION =====
    function renderPagination(data) {
        const container = document.getElementById('paginationContainer');

        if (data.total_pages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = `
            <button class="page-btn" onclick="loadNotifications(${data.page - 1})" ${!data.has_previous ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>
        `;

        const start = Math.max(1, data.page - 2);
        const end = Math.min(data.total_pages, data.page + 2);

        if (start > 1) {
            html += `<button class="page-btn" onclick="loadNotifications(1)">1</button>`;
            if (start > 2) html += `<span class="page-btn" style="cursor: default; border: none;">…</span>`;
        }

        for (let i = start; i <= end; i++) {
            html += `<button class="page-btn ${i === data.page ? 'active' : ''}" onclick="loadNotifications(${i})">${i}</button>`;
        }

        if (end < data.total_pages) {
            if (end < data.total_pages - 1) html += `<span class="page-btn" style="cursor: default; border: none;">…</span>`;
            html += `<button class="page-btn" onclick="loadNotifications(${data.total_pages})">${data.total_pages}</button>`;
        }

        html += `
            <button class="page-btn" onclick="loadNotifications(${data.page + 1})" ${!data.has_next ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>
        `;

        container.innerHTML = html;
    }

    // ===== ACTIONS =====
    window.handleNotificationClick = function (id, link) {
        fetch(`/dashboard/api/notifications/mark-read/${id}/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        }).then(() => {
            loadNotifications(currentPage, currentFilter);
            if (link && link !== '#') {
                setTimeout(() => window.location.href = link, 300);
            }
        }).catch(() => { });
    };

    window.markAsRead = function (id) {
        fetch(`/dashboard/api/notifications/mark-read/${id}/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        }).then(() => {
            loadNotifications(currentPage, currentFilter);
            showToast('Marked as read', 'success');
        }).catch(() => { });
    };

    window.deleteNotification = function (id) {
        if (!confirm('Delete this notification?')) return;
        fetch(`/dashboard/api/notifications/delete/${id}/`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        }).then(() => {
            loadNotifications(currentPage, currentFilter);
            showToast('Notification deleted', 'info');
        }).catch(() => { });
    };

    window.markAllRead = function () {
        if (!confirm('Mark all notifications as read?')) return;
        fetch('/dashboard/api/notifications/mark-all-read/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        }).then(() => {
            loadNotifications(currentPage, currentFilter);
            showToast('All notifications marked as read', 'success');
            updateParentBadge(0);
        }).catch(() => { });
    };

    window.refreshNotifications = function () {
        loadNotifications(currentPage, currentFilter);
        showToast('Refreshed', 'info');
    };

    window.exportNotifications = function () {
        fetch(`/dashboard/api/notifications/export/?filter=${currentFilter}`)
            .then(response => response.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `notifications-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Export successful', 'success');
            })
            .catch(() => showToast('Export failed', 'error'));
    };

    // ===== SEARCH =====
    function searchNotifications(query) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const container = document.getElementById('notificationsContainer');
            const items = container.querySelectorAll('.notification-item');

            if (!query.trim()) {
                items.forEach(item => item.style.display = '');
                // Remove empty state if exists
                const empty = container.querySelector('.empty-state');
                if (empty) empty.remove();
                return;
            }

            const term = query.toLowerCase().trim();
            let hasResults = false;

            items.forEach(item => {
                const title = item.querySelector('.notification-title')?.textContent?.toLowerCase() || '';
                const message = item.querySelector('.notification-message')?.textContent?.toLowerCase() || '';
                const matches = title.includes(term) || message.includes(term);
                item.style.display = matches ? '' : 'none';
                if (matches) hasResults = true;
            });

            // Show search empty state
            const existingEmpty = container.querySelector('.empty-state:not(.search-empty)');
            if (!hasResults) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state search-empty';
                emptyDiv.innerHTML = `
                    <div class="empty-icon" style="background: linear-gradient(135deg, #e8f0fe, #d4e4f7);">
                        <i class="fas fa-search"></i>
                    </div>
                    <h3>No results found</h3>
                    <p>Try adjusting your search terms</p>
                `;
                container.appendChild(emptyDiv);
            } else {
                const searchEmpty = container.querySelector('.search-empty');
                if (searchEmpty) searchEmpty.remove();
            }
        }, 300);
    }

    // ===== FILTERS =====
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const filter = this.dataset.filter;
            loadNotifications(1, filter);
        });
    });

    // ===== UTILITY FUNCTIONS =====
    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function updateParentBadge(count) {
        if (window.parent && window.parent !== window) {
            const badge = window.parent.document.getElementById('notificationCount');
            if (badge) {
                badge.textContent = count > 0 ? count : '0';
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }
    }

    // ===== TOAST SYSTEM (Uses base template message style) =====
    function showToast(message, type = 'info') {
        // Create message container if it doesn't exist
        let container = document.getElementById('django-messages');
        if (!container) {
            container = document.createElement('div');
            container.className = 'msg-container';
            container.id = 'django-messages';
            document.body.appendChild(container);
        }

        // Create message element matching base template
        const msg = document.createElement('div');
        msg.className = `msg ${type}`;
        msg.setAttribute('data-auto-dismiss', 'true');

        // Icon mapping
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            warning: 'fa-exclamation-circle',
            info: 'fa-info-circle'
        };

        msg.innerHTML = `
        <i class="fas ${icons[type] || icons.info}"></i>
        <span>${message}</span>
    `;

        container.appendChild(msg);

        // Auto dismiss after 4 seconds
        setTimeout(() => {
            if (msg.parentNode) {
                msg.style.animation = 'slideUp 0.3s ease-out forwards';
                setTimeout(() => {
                    if (msg.parentNode) msg.remove();
                    if (container.children.length === 0) container.remove();
                }, 300);
            }
        }, 4000);
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', function (e) {
        if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            refreshNotifications();
        }
        if (e.key === 'm' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            markAllRead();
        }
        if (e.key === 'Escape') {
            const search = document.getElementById('notificationSearch');
            if (search && document.activeElement === search) {
                search.value = '';
                searchNotifications('');
                search.blur();
            }
        }
        if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            const search = document.getElementById('notificationSearch');
            if (search) { search.focus(); search.select(); }
        }
    });

    // ===== AUTO-REFRESH =====
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        } else {
            refreshTimer = setInterval(() => {
                loadNotifications(currentPage, currentFilter);
            }, 30000);
        }
    });

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function () {
        loadNotifications(1, 'all');
        refreshTimer = setInterval(() => {
            loadNotifications(currentPage, currentFilter);
        }, 30000);

        // Show keyboard shortcuts hint
        console.log('📚 Notifications shortcuts: r=refresh, m=mark all read, /=search, Esc=clear search');
    });

    // Add fadeInUp animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    `;
    document.head.appendChild(style);
</script>
{% endblock %}
