<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Enrollment | AFRAS CORE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062ff;
            --primary-glow: rgba(0, 98, 255, 0.4);
            --bg: #f0f2f5;
            --surface: #111827;
            --primary-bg: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f9fafb;
            --main-text: #000000;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--main-text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .enrollment-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 750px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* Back Button - Same as student registration */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 10;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
            border-color: var(--primary);
            transform: translateX(-3px);
        }

        header {
            text-align: center;
            padding-top: 10px;
        }

        header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        header p {
            margin-bottom: 30px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input,
        select {
            background: var(--primary-bg);
            border: 1px solid var(--border);
            color: var(--main-text);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        input[type="file"] {
            padding: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* Messages styling similar to student registration */
        .msg-container {
            margin-bottom: 1.5rem;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            font-weight: 500;
            margin-bottom: 10px;
            animation: slideDown 0.4s ease-out forwards;
        }

        .msg.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 40%;
            cursor: pointer;
            margin: 1rem auto 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .footer-link {
            text-align: center;
            color: var(--text-dim);
            margin: 1rem auto 0;
            font-size: 0.8rem;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .footer-link a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-glow));
            border-radius: 1px;
            transition: width 0.3s ease;
        }

        .footer-link a:hover {
            color: var(--primary-glow);
            font-weight: 700;
        }

        .footer-link a:hover::after {
            width: 100%;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            .btn-submit {
                width: 100%;
            }

            .enrollment-card {
                padding: 2rem 1.5rem;
            }

            .back-btn {
                top: 15px;
                left: 15px;
                width: 35px;
                height: 35px;
            }

            header h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .enrollment-card {
                padding: 1.5rem 1rem;
            }

            .back-btn {
                top: 10px;
                left: 10px;
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }

            header h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="enrollment-card">
        <!-- Back Button - Goes to staff directory -->
        <a href="{% url 'staff-directory' %}" class="back-btn" title="Back to Staff Directory">
            <i class="fas fa-arrow-left"></i>
        </a>

        <header>
            <h2>Personnel Registration</h2>
            <p>Official Academic Staff Enrollment Portal</p>
        </header>

        <!-- Messages Container -->
        <div class="msg-container" id="django-messages">
            {% if messages %}
            {% for message in messages %}
            <div class="msg {{ message.tags }}">
                <i
                    class="fas {% if message.tags == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        </div>

        <form method="POST" action="{% url 'register-staff' %}" enctype="multipart/form-data" id="staff-reg-form">
            {% csrf_token %}

            <div class="form-grid">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" name="name" placeholder="Prof. Jane Doe" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-id-badge"></i> Staff ID / Username</label>
                    <input type="text" name="staff_id" placeholder="STF-2026-X" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Contact Number</label>
                    <input type="tel" name="phone" placeholder="+977-98XXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-graduation-cap"></i> Educational Degree</label>
                    <input type="text" name="degree" placeholder="PhD, MSc in CS" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="staff@college.edu" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-location-dot"></i> Address</label>
                    <input type="text" name="address" placeholder="Enter the address" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-briefcase"></i> Designation</label>
                    <input type="text" name="designation" placeholder="HOD / Senior Lecturer" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-sitemap"></i> Department</label>
                    <select name="department" required>
                        <option value="">Select Department</option>
                        <option value="CSIT">CSIT</option>
                        <option value="Engineering">Engineering</option>
                        <option value="BCA">BCA</option>
                        <option value="Management">Management</option>
                        <option value="Science">Science</option>
                        <option value="Humanities">Humanities</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-users-cog"></i> System Role</label>
                    <select name="role" required>
                        <option value="staff">Staff</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label><i class="fas fa-camera"></i> Profile Photo (For Identity Log)</label>
                    <input type="file" name="photo" accept="image/*" required id="photo-input">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" minlength="8" placeholder="Minimum 8 characters" required>
                </div>
                <div class="input-group">
                    <label style="color: var(--success);"><i class="fas fa-key"></i> Institutional Auth Key</label>
                    <input type="password" name="auth_key" placeholder="Required for staff registration" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <i class="fas fa-user-shield"></i> Authorize Identity & Register
            </button>
        </form>

        <div class="footer-link">
            Registered already? <a href="{% url 'login' %}">Login to Portal</a>
        </div>
    </div>

    <script>
        // Auto-dismiss messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.getElementById('django-messages');
            if (container) {
                setTimeout(() => {
                    const msgs = container.querySelectorAll('.msg');
                    msgs.forEach(m => {
                        m.style.transition = "all 0.6s ease";
                        m.style.opacity = "0";
                        m.style.transform = "translateX(20px)";
                        setTimeout(() => m.remove(), 600);
                    });
                }, 5000);
            }

            // Handle form submission UI
            const form = document.getElementById('staff-reg-form');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', function (e) {
                const photoInput = document.getElementById('photo-input');

                // Check if photo is uploaded
                if (photoInput.files.length === 0) {
                    e.preventDefault();
                    alert("Please upload a profile photo.");
                    return false;
                }

                // Check password length
                const passwordInput = form.querySelector('input[name="password"]');
                if (passwordInput.value.length < 8) {
                    e.preventDefault();
                    alert("Password must be at least 8 characters long.");
                    return false;
                }

                // Update button state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> PROCESSING...';

                return true;
            });
        });
    </script>
</body>

</html>
